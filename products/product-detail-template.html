<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail - ZSE Store</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .breadcrumb {
      max-width: 1100px;
      margin: 20px auto 0;
      padding: 0 20px;
      font-size: 0.85rem;
      color: #666;
    }
    .breadcrumb a { color: #ffd700; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* Detail layout */
    .detail-layout {
      display: flex;
      gap: 40px;
      max-width: 1100px;
      margin: 30px auto 60px;
      padding: 0 20px;
      flex-wrap: wrap;
    }
    .detail-image-wrap {
      flex: 1;
      min-width: 280px;
      max-width: 480px;
    }
    .detail-main-img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #333;
      background: #1a1a1a;
    }
    .detail-info {
      flex: 1;
      min-width: 280px;
    }
    .detail-cat-badge {
      display: inline-block;
      background: #222;
      color: #aaa;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .detail-title {
      font-size: 1.8rem;
      color: #fff;
      margin: 0 0 12px;
      line-height: 1.2;
    }
    .detail-variant { color: #aaa; font-size: 0.9rem; margin-bottom: 6px; }
    .detail-sku { color: #555; font-size: 0.85rem; margin-bottom: 20px; }
    .detail-price {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffd700;
      margin-bottom: 12px;
    }
    .detail-availability {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 24px;
      padding: 10px 14px;
      border-radius: 8px;
    }
    .detail-availability.in-stock { background: #0a2a0a; color: #4caf50; border: 1px solid #2a4a2a; }
    .detail-availability.out-stock { background: #2a1a00; color: #ff9800; border: 1px solid #4a3000; }
    .detail-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .btn-whatsapp {
      background: #25D366;
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-whatsapp:hover { background: #1ebe57; }
    .btn-call {
      background: #ffd700;
      color: #121212;
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      transition: background 0.2s;
      display: inline-block;
    }
    .btn-call:hover { background: #e6c200; }
    .detail-meta {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .detail-meta p { color: #888; font-size: 0.85rem; margin: 0; }

    #detailContent { min-height: 300px; }

    @media (max-width: 640px) {
      .detail-layout { flex-direction: column; }
      .detail-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="top-header-bar">
    <div class="container">
      <div class="logo">
        <a href="../index.html"><img src="../assets/logo.png" alt="ZSE Logo" class="logo-icon" /></a>
      </div>
      <nav class="nav-categories">
        <a href="../index.html">Home</a>
        <a href="../products.html">Products</a>
        <a href="../contact.html">Contact</a>
      </nav>
      <div class="order-hotline">
        <span>Order Hotline</span><br />
        <a href="tel:+923185929927">+92-318-5929927</a><br />
        <span>Call or WhatsApp</span>
      </div>
    </div>
  </header>

  <!-- Breadcrumb -->
  <nav class="breadcrumb">
    <a href="../index.html">Home</a> &rsaquo;
    <a href="../products.html">Products</a> &rsaquo;
    <span id="breadcrumbProduct">Loading...</span>
  </nav>

  <!-- Dynamic detail content -->
  <div id="detailContent">
    <p style="color:#aaa;text-align:center;padding:80px;font-size:1rem">Loading product...</p>
  </div>

  <!-- Floating WhatsApp -->
  <a href="https://wa.me/923185929927" target="_blank" class="floating-whatsapp" title="Chat on WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="24" fill="#25D366"/>
      <path fill="#fff" d="M35.2 12.8A15.8 15.8 0 0 0 8.1 30.7L6 42l11.6-3A15.8 15.8 0 0 0 35.2 12.8zm-11.2 24.3a13.1 13.1 0 0 1-6.7-1.8l-.5-.3-5.1 1.3 1.4-4.9-.3-.5a13.1 13.1 0 1 1 11.2 6.2zm7.2-9.8c-.4-.2-2.3-1.1-2.7-1.3-.4-.1-.6-.2-.9.2s-1 1.3-1.2 1.6c-.2.3-.5.3-.9.1a11.3 11.3 0 0 1-3.3-2 12.4 12.4 0 0 1-2.3-2.8c-.2-.4 0-.6.2-.8l.6-.7.4-.7.1-.5-1.2-2.9c-.3-.7-.6-.6-.9-.6h-.7c-.3 0-.7.1-1 .5a4.5 4.5 0 0 0-1.4 3.3 7.8 7.8 0 0 0 1.6 4.1 17.9 17.9 0 0 0 6.8 6 9.7 9.7 0 0 0 4.5 1.2 4.1 4.1 0 0 0 2.7-1 4.6 4.6 0 0 0 1.4-3c.1-.6-.2-.9-.5-1z"/>
    </svg>
  </a>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <nav class="footer-nav">
        <a href="../index.html">Home</a>
        <a href="../products.html">Products</a>
        <a href="../contact.html">Contact</a>
      </nav>
      <p>Khalabat Township, Qureshi Chowk, Sector #1, Main Road, Haripur, KPK</p>
      <p>© 2025 ZSE - Zain Sanitary & Electric Store. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="../js/products.js"></script>
</body>
</html>
