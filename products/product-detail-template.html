<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Product details — ZSE Store, Haripur KPK. Request a quote via WhatsApp or call us." />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <title>Product — ZSE Store</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    #detailContent { min-height: 400px; }
    .detail-loading {
      display: flex; align-items: center; justify-content: center;
      height: 400px; color: var(--text-muted); font-size: .95rem; gap: 12px;
    }
    .detail-spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border-lit);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .detail-layout { flex-direction: column; }
      .detail-title { font-size: 1.4rem; }
      .detail-price { font-size: 1.6rem; }
      .detail-actions { flex-direction: column; }
      .btn-whatsapp, .btn-call { text-align: center; }
    }
  </style>
</head>
<body>

  <header class="top-header-bar" role="banner">
    <div class="container">
      <div class="logo">
        <a href="../index.html" aria-label="ZSE Store Home">
          <img src="../assets/logo.png" alt="ZSE Store" class="logo-icon" />
        </a>
      </div>
      <nav class="nav-categories" aria-label="Main navigation">
        <a href="../index.html">Home</a>
        <a href="../products.html" class="active">Products</a>
        <a href="../contact.html">Contact</a>
      </nav>
      <div class="order-hotline">
        <span>Order Hotline</span><br />
        <a href="tel:+923185929927">+92-318-5929927</a>
      </div>
      <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-nav" aria-label="Mobile navigation">
    <a href="../index.html">🏠 Home</a>
    <a href="../products.html">📦 Products</a>
    <a href="../contact.html">📞 Contact</a>
    <a href="tel:+923185929927" style="color:var(--gold);font-weight:700">📲 +92-318-5929927</a>
  </nav>

  <!-- Breadcrumb -->
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a href="../index.html">Home</a>
    <span class="breadcrumb-sep">›</span>
    <a href="../products.html">Products</a>
    <span class="breadcrumb-sep">›</span>
    <span id="breadcrumbProduct" aria-current="page">Loading…</span>
  </nav>

  <!-- Dynamic content -->
  <main id="detailContent" aria-live="polite">
    <div class="detail-loading">
      <div class="detail-spinner"></div>
      <span>Loading product…</span>
    </div>
  </main>

  <a href="https://wa.me/923185929927" target="_blank" rel="noopener noreferrer"
    class="floating-whatsapp" aria-label="Chat on WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 48 48" aria-hidden="true">
      <circle cx="24" cy="24" r="24" fill="#25D366"/>
      <path fill="#fff" d="M35.2 12.8A15.8 15.8 0 0 0 8.1 30.7L6 42l11.6-3A15.8 15.8 0 0 0 35.2 12.8zm-11.2 24.3a13.1 13.1 0 0 1-6.7-1.8l-.5-.3-5.1 1.3 1.4-4.9-.3-.5a13.1 13.1 0 1 1 11.2 6.2zm7.2-9.8c-.4-.2-2.3-1.1-2.7-1.3-.4-.1-.6-.2-.9.2s-1 1.3-1.2 1.6c-.2.3-.5.3-.9.1a11.3 11.3 0 0 1-3.3-2 12.4 12.4 0 0 1-2.3-2.8c-.2-.4 0-.6.2-.8l.6-.7.4-.7.1-.5-1.2-2.9c-.3-.7-.6-.6-.9-.6h-.7c-.3 0-.7.1-1 .5a4.5 4.5 0 0 0-1.4 3.3 7.8 7.8 0 0 0 1.6 4.1 17.9 17.9 0 0 0 6.8 6 9.7 9.7 0 0 0 4.5 1.2 4.1 4.1 0 0 0 2.7-1 4.6 4.6 0 0 0 1.4-3c.1-.6-.2-.9-.5-1z"/>
    </svg>
  </a>

  <footer class="footer" role="contentinfo">
    <div class="footer-content">
      <nav class="footer-nav">
        <a href="../index.html">Home</a>
        <a href="../products.html">Products</a>
        <a href="../contact.html">Contact</a>
      </nav>
      <p>Qureshi Chowk, Sector #1, Main Road, Khalabat Township, Haripur, KPK</p>
      <p>&copy; <span id="yr"></span> ZSE — Zain Sanitary &amp; Electric Store. All Rights Reserved.</p>
    </div>
  </footer>

  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
  <script src="../js/home.js" defer></script>
  <script src="../js/products.js" defer></script>
</body>
</html>
